name: Community Points

on:
  workflow_dispatch:
    inputs:
      manual_user:
        description: GitHub username to award
        required: true
        type: string
      manual_points:
        description: Points to add (positive integer)
        required: false
        default: "1"
        type: string
      manual_reason:
        description: Reason recorded in ledger
        required: false
        default: Manual points adjustment
        type: string
      manual_event_key:
        description: Optional unique key for idempotency
        required: false
        type: string
  pull_request:
    types:
      - closed
  issues:
    types:
      - closed

permissions:
  contents: write
  pull-requests: write
  issues: read

concurrency:
  group: community-points
  cancel-in-progress: false

jobs:
  update-points:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Update points file
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          POINTS_IGNORE_USERS: github-actions[bot],dependabot[bot]
        run: |
          node .github/scripts/update-community-points.js \
            --event-path "$GITHUB_EVENT_PATH" \
            --event-name "$GITHUB_EVENT_NAME" \
            --actor "$GITHUB_ACTOR" \
            --repository "$GITHUB_REPOSITORY" \
            --manual-run-id "$GITHUB_RUN_ID" \
            --output-path "community-points.json" \
            --leaderboard-path "community-leaderboard.md"

      - name: Check points changes
        id: points_changes
        run: |
          if git diff --quiet -- community-points.json community-leaderboard.md; then
            echo "No points update."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create or update points PR
        if: steps.points_changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: ${{ github.event.repository.default_branch }}
          branch: chore/community-points-sync
          delete-branch: true
          commit-message: chore(points): update community points
          title: chore(points): update community points
          body: |
            Auto-generated by the Community Points workflow.
            - Updated `community-points.json`
            - Updated `community-leaderboard.md`
          add-paths: |
            community-points.json
            community-leaderboard.md
